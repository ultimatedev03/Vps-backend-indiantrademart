location = /robots.txt {
  root /var/www/indiantrademart;
  default_type text/plain;
  etag off;
  add_header Cache-Control "public, max-age=300, must-revalidate" always;
  try_files /robots.txt =404;
}

# Stable crawler-facing index backed by an atomic static R2 snapshot.
location = /sitemap.xml {
  proxy_pass https://sitemaps.indiantrademart.com/sitemaps/sitemap-index.xml;
  proxy_ssl_server_name on;
  resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
  proxy_set_header Host sitemaps.indiantrademart.com;
  proxy_http_version 1.1;
  proxy_read_timeout 180s;
  default_type application/xml;
  add_header X-Robots-Tag "index, follow" always;
}

# Retire previous experimental entry points. GSC should contain only /sitemap.xml.
location = /sitemap-live-20260708.xml { return 301 /sitemap.xml; }
location = /sitemap-live-20260708.xml/ { return 301 /sitemap.xml; }
location = /sitemap-google.xml { return 301 /sitemap.xml; }
location = /sitemap-google.xml/ { return 301 /sitemap.xml; }
location = /sitemap-index.xml { return 301 /sitemap.xml; }
location = /sitemap-index.xml/ { return 301 /sitemap.xml; }
location = /sitemap-r2-index.xml { return 301 /sitemap.xml; }
location = /sitemap-r2-index.xml/ { return 301 /sitemap.xml; }
location = /sitemaps/sitemap-index.xml { return 301 /sitemap.xml; }
location = /sitemaps/sitemap-index.xml/ { return 301 /sitemap.xml; }
location = /sitemap-1cr.xml { return 301 /sitemap.xml; }
location = /sitemap-1cr.xml/ { return 301 /sitemap.xml; }
location = /sitemap-1cr-20260707.xml { return 301 /sitemap.xml; }
location = /sitemap-1cr-20260707.xml/ { return 301 /sitemap.xml; }
location = /sitemap-1cr-20260708.xml { return 301 /sitemap.xml; }
location = /sitemap-1cr-20260708.xml/ { return 301 /sitemap.xml; }

# Versioned gzip shards remain static and immutable; no sitemap files live on VPS disk.
location ^~ /sitemaps/ {
  proxy_pass https://sitemaps.indiantrademart.com$request_uri;
  proxy_ssl_server_name on;
  resolver 1.1.1.1 1.0.0.1 valid=300s ipv6=off;
  proxy_set_header Host sitemaps.indiantrademart.com;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_hide_header Cache-Control;
  proxy_read_timeout 180s;
  add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location ~ ^/sitemap-(?:products|product-locations|vendors|vendor-locations|vendor-services|categories|category-locations|locations)(?:-[A-Za-z0-9_-]+)?(?:-index)?\.xml/?$ {
  return 301 /sitemap.xml;
}

location ~ ^/product/ {
  proxy_pass http://127.0.0.1:3100$request_uri;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 180s;
}

location ~ ^/(directory/vendor|directory/search)/ {
  proxy_pass http://127.0.0.1:3100$request_uri;
  proxy_http_version 1.1;
  proxy_set_header Host dir.indiantrademart.com;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 180s;
}

# Hierarchy-aware category/location landing pages receive the same server-rendered SEO shell.
location ~ ^/directory/[^/]+/[^/]+/[^/]+/[^/]+/[^/]+(?:/[^/]+)?/?$ {
  proxy_pass http://127.0.0.1:3100$request_uri;
  proxy_http_version 1.1;
  proxy_set_header Host dir.indiantrademart.com;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 180s;
}
